<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sun Zhifei 的个人经历页面已设为分享访问。">
    <meta name="robots" content="noindex,nofollow">
    <title>分享访问 | Sun Zhifei</title>
    <link rel="stylesheet" href="../assets/site.css">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="主导航">
            <a class="brand" href="../" aria-label="返回首页">
                <span>Sun Zhifei</span>
            </a>
            <div class="nav-links">
                <a href="../#about">关于</a>
                <a href="../#profile">联系</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="experience-gate" data-access-gate data-target-base=".">
            <div class="container">
                <div class="gate-card">
                    <p class="section-kicker">Private Access</p>
                    <h1>个人经历已设为分享访问。</h1>
                    <p>该页面不在公开导航中展示。如已收到分享码，可以在这里输入；也可以直接使用对方分享的完整链接打开。</p>

                    <form class="access-form" id="access-form">
                        <label class="sr-only" for="access-code">分享码</label>
                        <input id="access-code" name="access" type="text" autocomplete="off" placeholder="输入分享码">
                        <button class="button button-primary" type="submit">打开</button>
                    </form>
                    <p class="gate-message" id="access-message" role="status" hidden></p>

                    <a class="back-link gate-back" href="../">
                        返回个人主页
                        <span>↗</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <span>© 2026 Sun Zhifei. All rights reserved.</span>
            <span>Built for GitHub Pages.</span>
        </div>
    </footer>
    <script src="../assets/site.js"></script>
</body>
</html>
